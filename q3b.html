<!DOCTYPE html>
<html>
<head>
  <title>Question 3 - jQuery DOM Operations</title>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <style>
    .myStyle {
      background-color: coral;
      padding: 16px;
    }
  </style>
</head>
<body>
  <div id="myElement">Original Text</div>
  <div id="myDIV">
    <p>I am a myDIV.</p>
  </div>
  <button id="myButton">Click me</button>

  <script>
    // jQuery equivalent of a - change text content
    $("#myElement").text("Modified Text");

    // jQuery equivalent of b - add CSS class
    $("#myDIV").addClass("myStyle");

    // jQuery equivalent of c - button click event
    $("#myButton").click(function() {
      alert("Button clicked!");
    });
  </script>
</body>
</html>
