<!DOCTYPE html>
<html>
<head>
  <title>Question 1 - Change Content</title>
</head>
<body>
  <div id="myElement">
    <p>Welcome to my website!</p>
  </div>

  <script>
    // Change the content of the <p> to "Hello there!"
    document.querySelector("#myElement p").innerHTML = "Hello there!";
  </script>
</body>
</html>
