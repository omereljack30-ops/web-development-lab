<!DOCTYPE html>
<html>
<head>
  <title>Question 3 - For Loop</title>
</head>
<body>
  <p id="demo"></p>

  <script>
    // Using a for loop to display numbers 1 to 5
    let text = "";

    for (let i = 1; i <= 5; i++) {
      text += "The number is " + i + "<br>";
    }

    document.getElementById("demo").innerHTML = text;
  </script>
</body>
</html>
